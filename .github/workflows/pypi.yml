name: Build

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    name: 🐍 sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv build --all-packages --sdist --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: Packages
          path: dist/*.tar.gz

  build-wheels:
    name: ${{ matrix.os }} ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        package: [PyQt6-Qlementine, PySide6-Qlementine]
        include:
          # PyQt6 builds against Qt 6.8.1
          - package: PyQt6-Qlementine
            qt_version: "6.8.1"
          # PySide6 6.10 headers require Qt >= 6.10
          - package: PySide6-Qlementine
            qt_version: "6.10.2"
            # PySide6 6.10 only publishes manylinux_2_34 wheels
            cibw_manylinux: "manylinux_2_34"
    env:
      QT_VERSION: ${{ matrix.qt_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_VERBOSE: 1
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.cibw_manylinux || 'manylinux_2_28' }}
        with:
          package-dir: packages/${{ matrix.package }}
          config-file: pyproject.toml

      - name: Upload wheels artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.package }}-${{ runner.os }}-${{ runner.arch }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Get sdist
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist
      - name: Get wheels
        uses: actions/download-artifact@v8
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: 🚢 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "./dist/*"
