[build-system]
requires = ["sip >=6,<7", "PyQt-builder >=1.17,<2", "PyQt6==6.8.1", "ruff"]
build-backend = "sipbuild.api"

[project]
name = "PyQt6-Qlementine"
version = "1.4.3.0rc1"
requires-python = ">=3.10"
description = "Python bindings for Qlementine, a modern QStyle for desktop Qt6 applications"
license = "GPL-3.0-only"
license-files = ["LICENSE"]
readme = "../../README.md"
dependencies = ["PyQt6>=6.8.0"]
classifiers = [
	"Development Status :: 3 - Alpha",
	"Intended Audience :: Developers",
	"Operating System :: MacOS",
	"Operating System :: Microsoft :: Windows",
	"Operating System :: POSIX :: Linux",
	"Programming Language :: Python :: 3",
	"Topic :: Software Development :: Libraries :: Python Modules",
	"Topic :: Software Development :: Widget Sets",
	"Environment :: X11 Applications :: Qt",
	"Typing :: Typed",
]

[project.urls]
Upstream = "https://github.com/oclero/qlementine"
Homepage = "https://github.com/pyapp-kit/PyQlementine"

[dependency-groups]
build = ["sip >=6,<7", "PyQt-builder >=1.17,<2", "PyQt6==6.8.1", "PyQt6-Qt6==6.8.2"]

[tool.sip.builder]
jobs = 8

[tool.sip.bindings.PyQt6Qlementine]
pep484-pyi = true
sip-file = "_qlementine/PyQt6Qlementine.sip"
qmake-QT = ["widgets", "svg"]
include-dirs = [
	"../../qlementine/lib/include",
	"../../qlementine/lib/src",
]
headers = [
	"../../qlementine/lib/include/oclero/qlementine/Common.hpp",
